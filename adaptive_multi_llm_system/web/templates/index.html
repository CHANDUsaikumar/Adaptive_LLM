<!DOCTYPE html>
<html>
<head>
    <title>Adaptive Multi-LLM Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 60px;
        }
        textarea {
            width: 60%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .box {
            margin-top: 40px;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <h1>Adaptive Multi-LLM AI Assistant</h1>

    <form action="/ask" method="post">
        <textarea name="user_input" placeholder="Ask something..."></textarea><br>
        <button type="submit">Submit</button>
    </form>

    {% if input %}
    <div class="box">
        <h3>User Input</h3>
        <p>{{ input }}</p>

        <h3>Detected Task</h3>
        <p>{{ task }}</p>

        <h3>Model Selected</h3>
        <p>{{ model }}</p>

        <h3>Response</h3>
        <p>{{ output }}</p>
    </div>
    {% endif %}
</body>
</html>
